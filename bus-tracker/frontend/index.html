<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKCE Bus Tracking Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="left-panel">
        <div class="college-card">
            <img src="mkce-logo.png" alt="MKCE Logo">
            <h2>M.Kumarasamy College of Engineering</h2>
            <p>NAAC Accredited Autonomous Institution</p>
            <p>Approved by AICTE & Affiliated to Anna University</p>
            <p>Thalavapalayam, Karur - 639113</p>
        </div>

        <div class="welcome-text">
            <h1>Welcome to MKCE</h1>
            <h2>Bus Tracking Portal</h2>
            <p>A smart transport management platform for students and faculty.</p>
        </div>
    </div>

    <div class="login-panel">
        <h1>MKCE</h1>
        <h3>Student Login</h3>

        <input type="text" id="studentId" placeholder="Student ID">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
